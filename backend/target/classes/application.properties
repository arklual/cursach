spring.application.name=a11a

# API base path (swagger.yaml uses /v1)
server.servlet.context-path=/v1

# --- Postgres ---
spring.datasource.url=jdbc:postgresql://localhost:5432/a11a
spring.datasource.username=a11a
spring.datasource.password=a11a

# --- Liquibase ---
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# --- S3-compatible blob storage (MinIO locally) ---
app.s3.endpoint=http://localhost:9000
app.s3.region=us-east-1
app.s3.bucket=a11a-blobs
app.s3.access-key=minioadmin
app.s3.secret-key=minioadmin
app.s3.path-style-access=true

# --- SpringDoc OpenAPI (Swagger UI) ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
