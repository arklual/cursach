spring.application.name=a11a

# API base path (swagger.yaml uses /v1)
server.servlet.context-path=/v1

# --- Postgres ---
# В проде значения должны браться из переменных окружения; дефолты — для локальной разработки.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/a11a}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:a11a}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:a11a}

# --- Liquibase ---
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# --- S3-compatible blob storage (MinIO locally) ---
app.s3.endpoint=${APP_S3_ENDPOINT:http://localhost:9000}
app.s3.region=${APP_S3_REGION:us-east-1}
app.s3.bucket=${APP_S3_BUCKET:a11a-blobs}
app.s3.access-key=${APP_S3_ACCESS_KEY:minioadmin}
app.s3.secret-key=${APP_S3_SECRET_KEY:minioadmin}
app.s3.path-style-access=${APP_S3_PATH_STYLE_ACCESS:true}

# --- WebSocket / CORS ---
# Список разрешённых origin-ов для STOMP-эндпоинта. Через запятую, без пробелов.
# В dev по умолчанию открыто, в проде ОБЯЗАТЕЛЬНО переопределить переменной WS_ALLOWED_ORIGINS.
app.ws.allowed-origins=${WS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# --- Blob storage limits ---
app.blob.max-size-bytes=${APP_BLOB_MAX_SIZE_BYTES:104857600}

# --- SpringDoc OpenAPI (Swagger UI) ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
