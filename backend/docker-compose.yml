services:
  postgres:
    image: postgres:16-alpine
    container_name: a11a-postgres
    environment:
      POSTGRES_DB: a11a
      POSTGRES_USER: a11a
      POSTGRES_PASSWORD: a11a
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a11a -d a11a"]
      interval: 5s
      timeout: 5s
      retries: 10

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: a11a-docker-proxy
    restart: unless-stopped
    environment:
      # Allow only what the code-node executors need: list/create/start/wait/attach/remove containers and pull images.
      # Everything else (EXEC, VOLUMES, NETWORKS, SWARM, INFO, BUILD, AUTH, …) stays blocked.
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Сокет хоста виден только этому контейнеру; наружу порт не публикуется — только внутренняя compose-сеть.

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MVN_INSECURE: ${MVN_INSECURE:-true}
    container_name: a11a-app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_started
      docker-proxy:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/a11a
      SPRING_DATASOURCE_USERNAME: a11a
      SPRING_DATASOURCE_PASSWORD: a11a
      APP_S3_ENDPOINT: http://minio:9000
      APP_S3_REGION: us-east-1
      APP_S3_BUCKET: a11a-blobs
      APP_S3_ACCESS_KEY: minioadmin
      APP_S3_SECRET_KEY: minioadmin
      APP_S3_PATH_STYLE_ACCESS: "true"
      DOCKER_HOST: tcp://docker-proxy:2375
    ports:
      - "8080:8080"
      - "5432:5432"

  minio:
    image: minio/minio:latest
    container_name: a11a-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "6005:9000"
      - "6006:9001"

  minio-init:
    image: minio/mc:latest
    container_name: a11a-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      for i in $(seq 1 30); do
        mc alias set local http://minio:9000 minioadmin minioadmin && break;
        sleep 1;
      done;
      mc mb -p local/a11a-blobs || true;
      mc anonymous set download local/a11a-blobs || true;
      exit 0;
      "

