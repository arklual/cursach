databaseChangeLog:
  - changeSet:
      id: 005-001-create-workflow-snapshot
      author: a11a
      changes:
        - createTable:
            tableName: workflow_snapshot
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: revision_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: workflow_snapshot
            baseColumnNames: workflow_id
            referencedTableName: workflows
            referencedColumnNames: id
            constraintName: fk_workflow_snapshot_workflow
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: workflow_snapshot
            baseColumnNames: revision_id
            referencedTableName: workflow_revision
            referencedColumnNames: id
            constraintName: fk_workflow_snapshot_revision
            onDelete: RESTRICT
        - createIndex:
            tableName: workflow_snapshot
            indexName: ix_workflow_snapshot_workflow_created_at
            columns:
              - column:
                  name: workflow_id
              - column:
                  name: created_at
