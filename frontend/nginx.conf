# Nginx-конфиг для Angular SPA + reverse proxy на бэк
# Бэк живёт в той же docker-сети по имени сервиса `backend`, порт 8080.

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/tls.crt;
    ssl_certificate_key /etc/nginx/ssl/tls.key;

    root /usr/share/nginx/html;
    index index.html;

    # Basic auth — закрывает весь фронт и API, чтобы по домену
    # не лазил кто попало (анти-DDoS на уровне «знай пароль»).
    # Исключения объявляются отдельными location-блоками с `auth_basic off;`.
    # Файл монтируется томом из docker-compose (см. .htpasswd).
    auth_basic           "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Webhook — публичный, без авторизации (его дёргают внешние системы).
    # Должен идти ВЫШЕ /v1/, т.к. nginx выбирает самый длинный префикс,
    # но порядок здесь не важен — это просто для читаемости.
    location /v1/webhook/ {
        auth_basic off;
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static assets — кэшируем агрессивно (имена с хэшами от Angular)
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # index.html — не кэшировать
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /index.html =404;
    }

    # API backend
    location /v1/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (STOMP /ws). Бэк отдаёт endpoint под context-path /v1, поэтому
    # пробрасываем фронтовый /ws → /v1/ws (trailing slash в proxy_pass важен —
    # nginx подменяет префикс, а не дописывает).
    location /ws/ {
        proxy_pass http://backend:8080/v1/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # SPA-fallback — все остальные пути отдаём index.html (Angular Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
