name: ci / pr-checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  backend-tests:
    if: contains(toJson(github.event.pull_request.labels.*.name), 'backend') || true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Detect backend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
      - name: Set up JDK 24
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'
          cache: maven
      - name: Maven verify
        if: steps.changes.outputs.backend == 'true'
        working-directory: ./backend
        run: mvn -B verify

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Detect frontend changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.frontend == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        if: steps.changes.outputs.frontend == 'true'
        working-directory: ./frontend
        run: npm ci
      - name: Build (production)
        if: steps.changes.outputs.frontend == 'true'
        working-directory: ./frontend
        run: npm run build -- --configuration production

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: a11a
          POSTGRES_USER: a11a
          POSTGRES_PASSWORD: a11a
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U a11a -d a11a"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/a11a
      SPRING_DATASOURCE_USERNAME: a11a
      SPRING_DATASOURCE_PASSWORD: a11a
      APP_S3_ENDPOINT: http://localhost:6005
      APP_S3_BUCKET: a11a-blobs
      APP_S3_ACCESS_KEY: minioadmin
      APP_S3_SECRET_KEY: minioadmin
      APP_S3_PATH_STYLE_ACCESS: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'backend/**'
              - 'frontend/**'
              - '.github/workflows/ci.yml'

      - name: Start MinIO + create bucket
        if: steps.changes.outputs.relevant == 'true'
        run: |
          docker run -d --name minio \
            -p 6005:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6005/minio/health/ready -o /dev/null; then
              echo "MinIO ready after ${i}s"
              break
            fi
            sleep 1
          done
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:6005 \
            minio/mc mb local/a11a-blobs

      - name: Set up JDK 24
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'
          cache: maven

      - name: Set up Node.js 20
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.changes.outputs.relevant == 'true'
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        if: steps.changes.outputs.relevant == 'true'
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        if: steps.changes.outputs.relevant == 'true'
        working-directory: ./backend
        run: |
          nohup mvn -B -q spring-boot:run > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend
        if: steps.changes.outputs.relevant == 'true'
        run: |
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/v1/workflows -o /dev/null; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready in time"
          tail -200 backend/backend.log || true
          exit 1

      - name: Start frontend
        if: steps.changes.outputs.relevant == 'true'
        working-directory: ./frontend
        run: |
          nohup npx ng serve --host 0.0.0.0 --port 4200 > frontend.log 2>&1 &
          echo $! > frontend.pid

      - name: Wait for frontend
        if: steps.changes.outputs.relevant == 'true'
        run: |
          for i in $(seq 1 120); do
            if curl -sf http://localhost:4200 -o /dev/null; then
              echo "Frontend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend did not become ready in time"
          tail -200 frontend/frontend.log || true
          exit 1

      - name: Run Playwright tests
        if: steps.changes.outputs.relevant == 'true'
        working-directory: ./frontend
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report
        if: always() && steps.changes.outputs.relevant == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Upload backend log on failure
        if: failure() && steps.changes.outputs.relevant == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/backend.log
          retention-days: 7

      - name: Stop services
        if: always() && steps.changes.outputs.relevant == 'true'
        run: |
          [ -f backend/backend.pid ] && kill "$(cat backend/backend.pid)" || true
          [ -f frontend/frontend.pid ] && kill "$(cat frontend/frontend.pid)" || true
