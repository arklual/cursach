name: backend / build & deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
      - 'deploy/docker-compose.prod.yml'
  workflow_dispatch:

concurrency:
  group: backend-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kursach-backend

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'
          cache: maven
      - name: Run unit + integration tests (Testcontainers)
        working-directory: ./backend
        run: ./mvnw -B verify

  build-and-push:
    name: Build image and push to GHCR
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy compose file to server
        run: |
          scp -P "${{ secrets.SERVER_PORT }}" \
              deploy/docker-compose.prod.yml \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/kursach/docker-compose.prod.yml"

      - name: Pull new image and restart backend
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
              "cd /opt/kursach && \
               docker compose -f docker-compose.prod.yml --env-file .env pull backend && \
               docker compose -f docker-compose.prod.yml --env-file .env up -d backend && \
               docker image prune -f"

      - name: Smoke test (через nginx-фронт)
        run: |
          sleep 15
          curl --fail --retry 6 --retry-delay 5 \
               "http://${{ secrets.SERVER_HOST }}/v1/workflows" \
            || (echo "Smoke test failed" && exit 1)
