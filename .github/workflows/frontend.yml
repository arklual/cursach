name: frontend / build & deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
      - 'deploy/docker-compose.prod.yml'
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kursach-frontend

jobs:
  test:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: ./frontend
        run: npm ci

  build-and-push:
    name: Build image and push to GHCR
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VPS_HOST_RAW: ${{ secrets.VPS_HOST }}
      VPS_USER_RAW: ${{ secrets.VPS_USER }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Sanitize secrets and warm up known_hosts
        run: |
          VPS_HOST="$(printf '%s' "$VPS_HOST_RAW" | tr -d '\r\n[:space:]')"
          VPS_USER="$(printf '%s' "$VPS_USER_RAW" | tr -d '\r\n[:space:]')"
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ]; then
            echo "::error::VPS_HOST or VPS_USER is empty after sanitize"
            exit 1
          fi
          echo "VPS_HOST=$VPS_HOST" >> "$GITHUB_ENV"
          echo "VPS_USER=$VPS_USER" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 -H "$VPS_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy compose file to server
        run: |
          scp deploy/docker-compose.prod.yml \
              "${VPS_USER}@${VPS_HOST}:/opt/kursach/docker-compose.prod.yml"

      - name: Pull new image and restart frontend
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" \
              "cd /opt/kursach && \
               docker compose -f docker-compose.prod.yml --env-file .env pull frontend && \
               docker compose -f docker-compose.prod.yml --env-file .env up -d frontend && \
               docker image prune -f"

      - name: Smoke test frontend
        run: |
          sleep 5
          curl --fail --retry 6 --retry-delay 3 \
               "http://${VPS_HOST}/" \
            || (echo "Health check failed" && exit 1)
